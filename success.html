<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent — Manikandan G</title>
  <link href="assets/img/favicon.png" rel="icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f1117;
      --bg-card: #222633;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0b0;
      --accent: #3dd6c3;
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    .checkmark-circle {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(61, 214, 195, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .checkmark {
      color: var(--accent);
      font-size: 40px;
      font-weight: 600;
      line-height: 1;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 600;
      margin: 0 0 12px;
      color: var(--text-primary);
    }

    p {
      color: var(--text-secondary);
      font-size: 16px;
      line-height: 1.6;
      margin: 0 0 28px;
    }

    a {
      display: inline-block;
      padding: 12px 24px;
      background: var(--accent);
      color: var(--bg-primary);
      font-weight: 600;
      font-size: 14px;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    a:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="checkmark-circle">
      <span class="checkmark">&#10003;</span>
    </div>
    <h1>Message Sent</h1>
    <p>I received your message and will get back to you shortly.</p>
    <a href="index.html">Back to Portfolio</a>
  </div>
</body>

</html>
